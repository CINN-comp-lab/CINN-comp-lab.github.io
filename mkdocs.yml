site_name: CINN Computational Lab
site_url: https://cinn-comp-lab.github.io
repo_url: https://github.com/CINN-comp-lab
repo_name: CINN-comp-lab

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Connecting to racc2: tutorials/connecting-to-racc2.md
  - Packages:
    - fMRIprep: tutorials/running-fmriprep.md
    - MRIQC: tutorials/running-mriqc.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
